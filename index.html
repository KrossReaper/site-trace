<!DOCTYPE html>
<html>
<head>
  <title>SiteTrace</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      padding: 12px;
      width: 60%;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .status {
      font-weight: bold;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }

    .actions button {
      background: #334155;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>SiteTrace 🚀</h1>
  <p>Monitor your websites in real-time</p>

  <input id="url" placeholder="https://example.com">
  <button onclick="saveSite()">Add</button>
  <button onclick="clearSites()">🗑 Limpiar</button>

  <div id="list"></div>
</div>

<script>
  let sites = JSON.parse(localStorage.getItem("sites")) || [];
  let history = JSON.parse(localStorage.getItem("history")) || {};

  function saveSite() {
    let url = document.getElementById("url").value.trim();
    if (!url) return;

    if (sites.includes(url)) {
      alert("Este sitio ya está agregado");
      return;
    }

    sites.push(url);
    localStorage.setItem("sites", JSON.stringify(sites));
    renderList();
  }

  function clearSites() {
    localStorage.removeItem("sites");
    localStorage.removeItem("history");
    sites = [];
    history = {};
    renderList();
  }

  function deleteSite(site) {
    sites = sites.filter(s => s !== site);
    localStorage.setItem("sites", JSON.stringify(sites));
    renderList();
  }

  function renderList() {
    let html = "";
    sites.forEach(site => {
      html += `
        <div class="card" id="${site}">
          <span>${site}</span>
          <span class="status">⏳ Checking...</span>
          <div class="actions">
            <button onclick="showHistory('${site}')">📜</button>
            <button onclick="deleteSite('${site}')">❌</button>
          </div>
        </div>
      `;
    });
    document.getElementById("list").innerHTML = html;
  }

  function saveHistory(site, status) {
    if (!history[site]) history[site] = [];
    history[site].push({
      status,
      time: new Date().toLocaleTimeString()
    });
    localStorage.setItem("history", JSON.stringify(history));
  }

  function showHistory(site) {
    let logs = history[site] || [];
    let text = logs.map(h => `${h.time} → ${h.status}`).join("\n");
    alert(text || "Sin historial");
  }

  async function checkAllSites() {
    for (let site of sites) {
      let statusText = "";
      let color = "";

      try {
        let res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(site));

        if (res.ok) {
          statusText = "Online";
          color = "green";
        } else {
          statusText = "Offline";
          color = "red";
        }

      } catch {
        statusText = "Error";
        color = "red";
      }

      document.getElementById(site).innerHTML = `
        <span>${site}</span>
        <span class="status ${color}">${statusText}</span>
        <div class="actions">
          <button onclick="showHistory('${site}')">📜</button>
          <button onclick="deleteSite('${site}')">❌</button>
        </div>
      `;

      saveHistory(site, statusText);
    }
  }

  setInterval(checkAllSites, 10000);
  renderList();
</script>

</body>
</html>
